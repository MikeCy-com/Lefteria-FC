version: "3.8"

# ============================================================================
# LEFTERIA FC — Hostinger Docker Manager + Traefik deployment
# ----------------------------------------------------------------------------
# • Traefik (already running on Hostinger) handles all public traffic + SSL
# • Frontend container joins the shared `traefik-proxy` network
# • Nginx inside the frontend container proxies /api/* → backend on port 8001
# • Mongo is internal only
#
# Required on the VPS:
#   - Docker network `traefik-proxy` exists (Hostinger creates it automatically)
#   - DNS: lefteriafc.cy AND www.lefteriafc.cy → VPS public IP
#
# Set these env vars in Hostinger Docker Manager (or in `.env` next to this file):
#   COMPOSE_PROJECT_NAME=lefteriafc
#   DOMAIN=lefteriafc.cy
#   DOMAIN_URL=https://lefteriafc.cy
#   JWT_SECRET=<long-random>
#   ADMIN_USERNAME=Lefteria FC
#   ADMIN_PASSWORD=<your-pw>
#   VAPID_PUBLIC_KEY=...
#   VAPID_PRIVATE_KEY=...
#   VAPID_CONTACT=mailto:info@lefteriafc.cy
# ============================================================================

services:
  mongodb:
    image: mongo:7
    container_name: lefteriafc-mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    networks:
      - lefteriafc-internal
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lefteriafc-backend
    restart: always
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=lefteria_fc
      - CORS_ORIGINS=https://${DOMAIN:-lefteriafc.cy},https://www.${DOMAIN:-lefteriafc.cy}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_CONTACT=${VAPID_CONTACT}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - lefteriafc-internal
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=${DOMAIN_URL:-https://lefteriafc.cy}
        - REACT_APP_VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
    container_name: lefteriafc-frontend
    restart: always
    networks:
      - lefteriafc-internal
      - traefik-proxy
    depends_on:
      - backend
    labels:
      # ---- Enable Traefik for this container ----
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"

      # ============================================================
      # HTTPS routers — one router per host (Traefik v3 safe pattern)
      # Hostinger Traefik defaults: entrypoint=websecure, resolver=letsencrypt
      # We do NOT set `tls=true` — only `tls.certresolver` so Let's Encrypt
      # issues a real cert instead of a self-signed fallback.
      # ============================================================
      - "traefik.http.routers.lefteriafc-apex.rule=Host(`lefteriafc.cy`)"
      - "traefik.http.routers.lefteriafc-apex.entrypoints=websecure"
      - "traefik.http.routers.lefteriafc-apex.tls.certresolver=letsencrypt"
      - "traefik.http.routers.lefteriafc-apex.service=lefteriafc"

      - "traefik.http.routers.lefteriafc-www.rule=Host(`www.lefteriafc.cy`)"
      - "traefik.http.routers.lefteriafc-www.entrypoints=websecure"
      - "traefik.http.routers.lefteriafc-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.lefteriafc-www.service=lefteriafc"

      # ============================================================
      # HTTP → HTTPS redirect routers (one per host)
      # ============================================================
      - "traefik.http.routers.lefteriafc-apex-http.rule=Host(`lefteriafc.cy`)"
      - "traefik.http.routers.lefteriafc-apex-http.entrypoints=web"
      - "traefik.http.routers.lefteriafc-apex-http.middlewares=lefteriafc-redirect"

      - "traefik.http.routers.lefteriafc-www-http.rule=Host(`www.lefteriafc.cy`)"
      - "traefik.http.routers.lefteriafc-www-http.entrypoints=web"
      - "traefik.http.routers.lefteriafc-www-http.middlewares=lefteriafc-redirect"

      # ---- Redirect middleware (shared) ----
      - "traefik.http.middlewares.lefteriafc-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.lefteriafc-redirect.redirectscheme.permanent=true"

      # ---- Backing service: nginx inside the frontend container listens on 80 ----
      - "traefik.http.services.lefteriafc.loadbalancer.server.port=80"

volumes:
  mongo_data:
  uploads_data:

networks:
  # Shared with Hostinger's Traefik instance
  traefik-proxy:
    external: true
  # Private network for backend ↔ mongo ↔ frontend internal proxy
  lefteriafc-internal:
    driver: bridge
