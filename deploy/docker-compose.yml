services:
  mongodb:
    image: mongo:7
    container_name: lefteria-mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: lefteriafc-backend:latest
    container_name: lefteria-backend
    restart: always
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=lefteria_fc
      - CORS_ORIGINS=https://lefteriafc.cy,https://www.lefteriafc.cy
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_CONTACT=${VAPID_CONTACT}
    volumes:
      - uploads_data:/app/uploads
      - ./:/app/deploy:ro
    depends_on:
      mongodb:
        condition: service_healthy
    expose:
      - "8001"
    labels:
      - traefik.enable=true

      # API routers — NO stripPrefix; backend serves /api/* natively
      - traefik.http.routers.lefteriafc-apex-api.rule=Host(`lefteriafc.cy`) && PathPrefix(`/api`)
      - traefik.http.routers.lefteriafc-apex-api.entrypoints=websecure
      - traefik.http.routers.lefteriafc-apex-api.tls.certresolver=letsencrypt
      - traefik.http.routers.lefteriafc-apex-api.service=lefteriafc-api

      - traefik.http.routers.lefteriafc-www-api.rule=Host(`www.lefteriafc.cy`) && PathPrefix(`/api`)
      - traefik.http.routers.lefteriafc-www-api.entrypoints=websecure
      - traefik.http.routers.lefteriafc-www-api.tls.certresolver=letsencrypt
      - traefik.http.routers.lefteriafc-www-api.service=lefteriafc-api

      - traefik.http.services.lefteriafc-api.loadbalancer.server.port=8001

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=${DOMAIN_URL:-https://lefteriafc.cy}
        - REACT_APP_VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
    image: lefteriafc-frontend:latest
    container_name: lefteria-frontend
    restart: always
    depends_on:
      - backend
    expose:
      - "80"
    labels:
      - traefik.enable=true

      # HTTPS routers — one Host() per router (Traefik v3 safe)
      - traefik.http.routers.lefteriafc-apex.rule=Host(`lefteriafc.cy`)
      - traefik.http.routers.lefteriafc-apex.entrypoints=websecure
      - traefik.http.routers.lefteriafc-apex.tls.certresolver=letsencrypt
      - traefik.http.routers.lefteriafc-apex.service=lefteriafc

      - traefik.http.routers.lefteriafc-www.rule=Host(`www.lefteriafc.cy`)
      - traefik.http.routers.lefteriafc-www.entrypoints=websecure
      - traefik.http.routers.lefteriafc-www.tls.certresolver=letsencrypt
      - traefik.http.routers.lefteriafc-www.service=lefteriafc

      - traefik.http.services.lefteriafc.loadbalancer.server.port=80

volumes:
  mongo_data:
  uploads_data:
